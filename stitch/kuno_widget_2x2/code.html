<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.widget-shadow {
    box-shadow: 0 12px 32px rgba(44, 36, 22, 0.08)
    }
.linen-texture {
    background-color: #FAF7F2;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCPlZplAUganxljAhV8H02SyoI0Lfb2NDAxlkOtL7YlIGu-7FjTJcpu0A2ivUVJqs3KLTu3rOn8AuaDhXZdZRHvzf2jtBzwK0a3nI57H1DrDwScZ7CbcIWul7_TZe1H8KVAbWEIMAH_cHH7YSeKnDisDh6mK3WTvgtK8IzRwkfiab3PZTLAAXFJnmIzUeHbmGC6YqcXyQoZSMBT7hJN9PDlzYOwHSWQaOtNwnX1Gfi4l-Y_H0R8gHTYuiBqJZu4p7JA4nhDzYwogiig)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-[#f0ede9] min-h-screen flex items-center justify-center p-6 font-body text-on-surface">
<!-- 2x2 Android Widget Container (Approx 160dp x 160dp translated to 320px for high-res display) -->
<div class="w-80 h-80 bg-[#FAF7F2] rounded-[12px] p-5 flex flex-col justify-between widget-shadow linen-texture relative overflow-hidden group">
<!-- Subtle Branding Overlay -->
<div class="absolute top-4 right-5 opacity-20 pointer-events-none">
<span class="font-headline italic text-sm text-primary">Kuno</span>
</div>
<!-- Top Section: Book Cover -->
<div class="flex-shrink-0">
<div class="w-20 h-28 rounded-[4px] overflow-hidden shadow-md transform transition-transform group-hover:scale-105 duration-300">
<img alt="Atomic Habits by James Clear" class="w-full h-full object-cover" data-alt="Close-up of a minimalist book cover titled Atomic Habits with clean white space and soft lighting on a wooden desk" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmEjUcp6eHH37u1-NAabeVd4dNGH6amLFc_cdWS2FvaPX0T0C-Lq6njcRg4eYdQxwH3TcH5-5POhCK7_Oq_XiEejlZ7oJUo0rmoQmq9ENL3DW1uYiDR3jyG9HC9TS_eyQikZHtSQRWTAnoXLp61d70Y0JxvUXyvGcmKgjI3jcEWC_2_jLX_peR9GWoLRc-y6kDxf4nU_vtpNu5BvVdyW6Ejp3RjRmmkuTX6JVJYsQ_LrlMofORVM8B0OIMOT-vyq8k1BLoI-8cEwBY"/>
</div>
</div>
<!-- Middle Section: Typography -->
<div class="mt-4">
<h1 class="font-headline text-2xl font-bold leading-tight tracking-tight text-on-surface">
                Atomic Habits
            </h1>
<p class="font-body text-sm text-on-surface-variant font-medium mt-0.5">
                James Clear
            </p>
</div>
<!-- Bottom Section: Progress & Action -->
<div class="mt-auto pt-4">
<div class="flex items-center justify-between gap-3">
<div class="flex-grow">
<div class="flex items-center justify-between mb-2">
<span class="text-[11px] font-bold font-label uppercase tracking-widest text-on-surface-variant/70">Progress</span>
<span class="text-xs font-bold font-body text-primary">37%</span>
</div>
<!-- Custom Progress Bar -->
<div class="h-2 w-full bg-[#E0D5C5] rounded-full overflow-hidden relative">
<div class="h-full bg-[#C17F4A] rounded-full w-[37%] shadow-inner"></div>
</div>
</div>
<!-- Quick Add Button -->
<button class="flex-shrink-0 w-10 h-10 bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center transition-all duration-300 active:scale-90 hover:brightness-110 shadow-sm">
<span class="material-symbols-outlined text-2xl" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Visual Polish: Soft Grain Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply bg-repeat" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAUPQ60chZjGkok8ilWgx5whJeIkUlh-ZQDDoau2OFhRYq6G_giP6Ja4Zeg4BPKB5LCWIeVOGQBj-fXlLBDrWBp87zrWa9Vxu3qblD-MORUoaUXSm3GZ9Vrc7GpSPHMK-MeSnapkQFwfxFrkx4Ay0Wy8qfMUceN4Qabz1dRC7J2l_sm8SbAiNc5dyRXKsBNhBcxIM6gUW5imxlvOT1LI4umqL0EvIrpXC2u3OVOl5Yj3Ot9NPKLjJyeAJwp9-6T5ECBio3VmEo5ggsB');"></div>
</div>
<!-- Background Decoration (Mobile Home Screen Context) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full"></div>
</div>
</body></html>
