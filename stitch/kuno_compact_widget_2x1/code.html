<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#281903",
                    "primary-container": "#a36634",
                    "surface-container-high": "#ebe8e3",
                    "secondary": "#715b3e",
                    "on-primary-fixed-variant": "#6c3a09",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e5e2dd",
                    "surface-dim": "#dcdad5",
                    "on-tertiary-fixed-variant": "#73323a",
                    "inverse-on-surface": "#f3f0eb",
                    "on-error-container": "#93000a",
                    "background": "#fcf9f4",
                    "on-error": "#ffffff",
                    "surface-variant": "#e5e2dd",
                    "on-primary-container": "#fffbff",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb2b8",
                    "secondary-fixed-dim": "#dfc29f",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffdadb",
                    "on-primary-fixed": "#2f1400",
                    "on-surface": "#1c1c19",
                    "on-tertiary-fixed": "#3b0711",
                    "surface-container": "#f0ede9",
                    "surface-tint": "#895120",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#ffb780",
                    "outline": "#857469",
                    "tertiary-container": "#aa5e66",
                    "inverse-surface": "#31302d",
                    "tertiary": "#8d464f",
                    "secondary-fixed": "#fcdeba",
                    "inverse-primary": "#ffb780",
                    "on-background": "#1c1c19",
                    "on-secondary-fixed-variant": "#574329",
                    "on-surface-variant": "#52443a",
                    "surface": "#fcf9f4",
                    "on-tertiary-container": "#fffbff",
                    "outline-variant": "#d7c3b6",
                    "secondary-container": "#f9dbb7",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "primary": "#864e1e",
                    "surface-bright": "#fcf9f4",
                    "primary-fixed": "#ffdcc4",
                    "on-secondary-container": "#755f42",
                    "surface-container-low": "#f6f3ee"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .widget-shadow {
            box-shadow: 0 12px 32px rgba(44, 36, 22, 0.06);
        }
    </style>
</head>
<body class="bg-surface-dim flex items-center justify-center min-h-screen p-6">
<!-- Android Home Screen Mockup Context -->
<div class="relative w-full max-w-[360px] aspect-[9/19] bg-[#E5E2DD] rounded-[48px] border-[8px] border-on-surface p-4 overflow-hidden shadow-2xl">
<!-- Status Bar -->
<div class="flex justify-between items-center px-6 py-2 mb-8">
<span class="text-xs font-medium text-on-surface">12:45</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[14px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[14px]">wifi</span>
<span class="material-symbols-outlined text-[14px]">battery_full</span>
</div>
</div>
<!-- Android Widget Shell (Resized to be compact) -->
<div class="w-full px-2">
<!-- Compact 3x2 Widget Container -->
<div class="bg-[#FAF7F2] rounded-[24px] p-4 widget-shadow border border-white/40 flex flex-col gap-3">
<!-- Widget Header -->
<div class="flex justify-between items-center">
<span class="font-headline text-[12px] font-semibold text-primary tracking-tight">Now Reading</span>
<div class="flex gap-1">
<div class="w-1 h-1 rounded-full bg-primary/20"></div>
<div class="w-1 h-1 rounded-full bg-primary/20"></div>
</div>
</div>
<!-- Content Layer -->
<div class="flex gap-3 items-start">
<!-- Book Thumbnail -->
<div class="relative flex-shrink-0">
<img class="w-12 h-16 object-cover rounded-sm shadow-sm" data-alt="front cover of Atomic Habits book with clean white and silver typography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtzfTL3AKuQRyyPqhhMyh9--2amS1g5aYB72XiEJcGi7tl2A3rBMSWlLfK2gqKgKnE9c1HC4WNDiEE2iWCTwmUa2N34bl0Ohu4r3WejLS3SBJ3we34FTA08xOpxDVMWu4Lc1O2gGX7ThbGaVZW5zXInsG98FRAH1jh8YHKtMD55K1V5hN93TGBEeV7lBD3UNeLzy-qUpmfZ2m0v8_Pbpg4ahSie4F7ScwBIpwpDBO2GyHV9Rxn6ueLzZNGEuBg3Vi5VNM4KM6LmBcW"/>
<div class="absolute inset-0 rounded-sm bg-black/5 pointer-events-none"></div>
</div>
<!-- Details -->
<div class="flex-grow min-w-0">
<h3 class="font-headline text-md font-bold text-on-surface leading-tight truncate">Atomic Habits</h3>
<p class="font-label text-[10px] text-on-surface-variant/70">James Clear</p>
<!-- Progress Tracking (More compact) -->
<div class="mt-3">
<div class="flex justify-between items-end mb-1">
<span class="font-label text-[8px] font-bold text-primary tracking-widest uppercase">Progress</span>
<span class="font-headline italic text-xs font-medium text-primary">37%</span>
</div>
<div class="h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container rounded-full w-[37%]"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Spacer for Grid feel -->
<div class="mt-12 grid grid-cols-4 gap-6 px-4">
<div class="aspect-square rounded-2xl bg-white/40 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant/60">google</span>
</div>
<div class="aspect-square rounded-2xl bg-white/40 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
</div>
<div class="aspect-square rounded-2xl bg-white/40 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant/60">photo_library</span>
</div>
<div class="aspect-square rounded-2xl bg-white/40 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant/60">settings</span>
</div>
</div>
</div>
<!-- Navigation Pill -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-24 h-1.5 bg-on-surface/20 rounded-full"></div>
</div>
</body></html>
