        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAF7F2;

    body {

<body class="font-body text-on-surface selection:bg-secondary-container">
<div class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Header / Wordmark Section -->
<header class="mb-10 flex flex-col items-center gap-2">
<div class="flex items-center gap-2 text-[#C17F4A]">
<span class="material-symbols-outlined text-3xl" data-icon="menu_book">menu_book</span>
</div>
<h1 class="font-headline text-4xl font-bold tracking-tight text-primary">Kuno</h1>
</header>
<!-- Login Card -->
<main class="w-full max-w-[420px] bg-[#F2EDE4] rounded-xl editorial-shadow p-8 md:p-10">
<div class="mb-8">
<h2 class="font-headline text-[24px] font-semibold text-on-surface mb-2">Welcome back</h2>
<p class="text-on-surface-variant text-sm">Return to your private digital sanctuary.</p>
</div>
<form class="space-y-6">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="email">
                        Email Address
                    </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-[#8E8377] text-[20px]" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-highest/30 border-[#E0D5C5] rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-[#8E8377] focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" id="email" placeholder="your@email.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-[#8E8377] text-[20px]" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest/30 border-[#E0D5C5] rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-[#8E8377] focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<div class="pt-2">
<button class="w-full bg-[#C17F4A] hover:bg-[#a36634] text-white font-bold py-4 rounded-full transition-all active:scale-[0.98] editorial-shadow text-sm tracking-wide" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Secondary Actions -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm">
                    New to the library? 
                    <a class="text-[#C17F4A] font-semibold ml-1 hover:underline" href="#">Create an account</a>
</p>
</div>
</main>
<!-- Footer / Decorative Element -->
<footer class="mt-12 opacity-40">
<div class="flex items-center gap-6 grayscale">
<div class="h-[1px] w-12 bg-on-surface-variant"></div>
<span class="font-headline italic text-sm">Est. 2024</span>
<div class="h-[1px] w-12 bg-on-surface-variant"></div>
</div>
</footer>
</div>
<!-- Background Illustration / Texture -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-[0.03]">
<div class="absolute top-0 right-0 w-1/2 h-full" data-alt="vintage book texture with subtle paper grain and aged edges in soft sepia tones" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDjgy7qOOWClSZWN9CocUJFwAsfElPnJpRIgDkWkbU0-UQ-wM0TNVUq5oZcsqThIHYHmYkC5V-yie8qrZQa8FFZ_EdHVFCFUZtcr9JUe12Cn_qlX_pjACsPEPO0zDb12qPegtLSm2ra1661soD7N8TmUF2yAPF2xm2mAQ7Xlh1ghfqJenNvcfJ1g4rETnW03CAOrkbRMxHkvz1mZj7bBiS7cGIvUUHcDgtnMxdN1Ke-UdTnw8m3EFKrcHgZaFy8VWvcXJsIvFseu9aE'); background-size: cover;"></div>
</div>
